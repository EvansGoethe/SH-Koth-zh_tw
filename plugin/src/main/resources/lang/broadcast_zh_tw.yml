#
# 廣播設定檔 (繁體中文)
# * 格式: MiniMessage (https://docs.advntr.dev/minimessage/format)
# * 每個訊息均支援 PlaceholderAPI 佔位符
# * 如果想停用某個廣播訊息，只需將其設為空字串: ""
# 支援服務: https://discord.smartshub.dev/
# 文件: https://docs.smartshub.dev/sh-koth/intro/introduction/

# * %shkoth_koth_context% - KOTH 的顯示名稱 (僅在發送訊息的當下有效)
# * %shkoth_player_context% - 玩家名稱 (僅在發送訊息的當下有效)
# 如需「永久有效」的佔位符，請參考文件說明的內容：
koth:
  force-start:
    - "<gold>--------------------------------------------------"
    - "<yellow>KOTH 事件 %shkoth_koth_context% 已被管理員強制啟動。"
    - "                <yellow>準備戰鬥！"
    - "         <yellow>首個佔領該 KOTH 的隊伍/玩家獲勝！"
    - "<gold>--------------------------------------------------"

  force-stop:
    - "<dark_red>--------------------------------------------------"
    - "<red>KOTH 事件 %shkoth_koth_context% 已被管理員強制停止。"
    - "           <red>該次活動已被取消。"
    - "<dark_red>--------------------------------------------------"

  force-stop-all:
    - "<dark_red>--------------------------------------------------"
    - "    <red>所有 KOTH 事件已被強制停止。"
    - "    <red>所有進行中的活動已被取消。"
    - "<dark_red>--------------------------------------------------"

  end:
    - "<dark_purple>--------------------------------------------------"
    - "    <light_purple>KOTH 事件 %shkoth_koth_context% 已結束！"
    - "        <light_purple>恭喜本次活動的獲勝者！"
    - "<dark_purple>--------------------------------------------------"

  start:
    - "--------------------------------------------------"
    - "   KOTH 事件 %shkoth_koth_context% 已經開始！"
    - "    佔領此 KOTH 以贏得豐富的獎勵！"
    - "--------------------------------------------------"

  capture:
    start:
      - "<dark_green>--------------------------------------------------"
      - "<green>KOTH 事件 %shkoth_koth_context% 正由 %shkoth_player_context% 佔領中！"
      - "     <green>在時間結束前趕快去奪回它！"
      - "<dark_green>--------------------------------------------------"

    stop:
      - "<dark_blue>--------------------------------------------------"
      - "<blue>KOTH 事件 %shkoth_koth_context% 的佔領已被中斷！"
      - "              <blue>戰鬥仍在繼續！"
      - "<dark_blue>--------------------------------------------------"


# 請勿更動此項！
config-version: 1

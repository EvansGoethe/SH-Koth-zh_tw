  kick-member-success: "<green>您已成功將 %shkoth_player_context% 踢出您的隊伍。"
  removed-from-team: "<red>您已被移出隊伍。"
  member-removed: "<green>%shkoth_player_context% 已被移出您的隊伍。"
  not-in-a-team: "<red>您不在任何隊伍中。"
  team-info-header: "<light_purple>--- 隊伍資訊 ---"
  team-info-footer: "<light_purple>----------------"
  change-leader: "<light_purple>您更改了隊伍隊長，新隊長為 %shkoth_player_context%。"
  transferred-leadership-success: "<green>您已成功將隊長權限轉移給 %shkoth_player_context%。"

  added-to-team: "<green>您已被加入隊伍。"
  new-member-joined: "<green>%shkoth_player_context% 已加入您的隊伍。"
  disbanded-team-success: "<green>您已成功解散隊伍。"
  dissolved: "<red>隊伍已被 %shkoth_player_context% 解散。"
  already-in-a-team: "<red>您已經在隊伍中。"
  cant-create-team: "<red>您現在無法創建隊伍。"
  cant-join-team: "<red>您現在無法加入此隊伍。"
  leader-cant-leave: "<red>隊伍隊長無法直接離開隊伍。"
  cant-leave-team: "<red>您無法離開隊伍。"
  only-leader-can-disband: "<red>只有隊伍隊長可以解散隊伍。"

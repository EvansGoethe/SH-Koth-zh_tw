  invitation-sent: "<green>已成功向 %shkoth_aux_context% 發送隊伍邀請。"
  no-pending-invitations: "<red>您沒有任何待處理的隊伍邀請。"
  invitation-accepted: "<green>已接受隊伍邀請。"
